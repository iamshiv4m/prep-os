appId: com.prepos.app
productName: PrepOS
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

asar: true

files:
  - out/**/*
  - package.json

extraResources:
  - from: build/icon.png
    to: icon.png
  - from: resources/tray-icon.png
    to: tray-icon.png

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  extendInfo:
    NSScreenCaptureUsageDescription: PrepOS captures regions of your screen so you can ask the in-app AI questions about them.

dmg:
  sign: false
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-Setup-${version}.${ext}

linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png
  category: Development

publish:
  provider: github
  releaseType: release
