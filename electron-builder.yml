appId: com.prepos.app
productName: PrepOS
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build

asar: true

files:
  - out/**/*
  - package.json

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  extendInfo:
    NSScreenCaptureUsageDescription: PrepOS captures regions of your screen so you can ask the in-app AI questions about them.
    NSCameraUsageDescription: PrepOS does not use the camera directly; this entry is required by the hardened runtime entitlement.
    NSMicrophoneUsageDescription: PrepOS does not record audio; this entry is required by the hardened runtime entitlement.

dmg:
  sign: false
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64

linux:
  target:
    - AppImage
    - deb

publish:
  provider: github
  releaseType: release
