name: Release

# Triggers when you push a tag that looks like a SemVer release. Example:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Flow:
#   1. `release` matrix builds for macOS / Windows / Linux in parallel and
#      uploads each runner's artifacts into the same draft GitHub Release
#      (matched by tag).
#   2. `publish` runs after all three succeed and flips the draft to a
#      public release marked as "latest". No manual click needed.
#
# If you'd rather inspect the artifacts before publishing, comment out the
# `publish` job below and click "Publish release" manually in the GitHub UI.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: branded download page for the in-app update banner. If
          # unset, the banner deep-links to the GitHub Release page instead
          # (which always works). Set as a repo / org variable, not a secret.
          PREPOS_WEBSITE_URL: ${{ vars.PREPOS_WEBSITE_URL }}
          # Once you have an Apple Developer cert, uncomment these and add
          # the corresponding repo secrets to enable signing + notarization:
          # CSC_LINK: ${{ secrets.MAC_CERTS }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist:mac -- --publish always

      - name: Build & publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREPOS_WEBSITE_URL: ${{ vars.PREPOS_WEBSITE_URL }}
          # Once you have a Windows code-signing cert, uncomment:
          # CSC_LINK: ${{ secrets.WIN_CERTS }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTS_PASSWORD }}
        run: npm run dist:win -- --publish always

      - name: Build & publish (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREPOS_WEBSITE_URL: ${{ vars.PREPOS_WEBSITE_URL }}
        run: npm run dist:linux -- --publish always

  # Flips the draft release that the matrix uploaded into to a public,
  # "latest" release. Runs only if all three platform builds succeeded.
  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          echo "Publishing draft for tag $TAG …"

          # gh CLI is preinstalled on GitHub-hosted runners. We use the API
          # directly because `gh release edit --draft=false` requires the
          # release to already exist (which it does, created by electron-
          # builder during the matrix step).
          gh release edit "$TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false \
            --latest \
            --verify-tag

          echo "✓ Released: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
